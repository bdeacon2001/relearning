<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>95 speed shop</title>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo">95 SPEED SHOP</div>
            <div class="cart-status">Cart: <span id="cart-count">0</span></div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>KACHOW!</h1>
            <p>The fastest merch in the Piston Cup</p>
        </section>

        <section id="product-container" class="product-grid">
        </section>
    </main>

   </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div id="cart-items-container">
            <p class="empty-message">Your cart is empty!</p>
        </div>
        <div class="cart-footer">
            <h3>Total: $<span id="cart-total">0.00</span></h3>
            <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
